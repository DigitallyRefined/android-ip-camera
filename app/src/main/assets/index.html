<!DOCTYPE html>
<html>

<head>
  <title>Android IP Camera</title>
  <style>
    body {
      background: #121212;
      color: #fff;
      font-family: sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .header {
      padding: 10px 20px;
      background: #1e1e1e;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .stream-container {
      flex: 1;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      position: relative;
    }

    .controls-panel {
      width: 350px;
      background: #1e1e1e;
      padding: 20px;
      border-left: 1px solid #333;
      overflow-y: auto;
    }

    img {
      transition: all 0.2s ease;
    }

    .fit-screen img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .original-size img {
      width: auto;
      height: auto;
    }

    .btn {
      background: #333;
      color: #fff;
      border: 1px solid #555;
      padding: 8px 15px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s;
    }

    .btn:hover {
      background: #444;
    }

    .btn.active {
      background: #007AFF;
      border-color: #007AFF;
    }

    .btn-action {
      width: 100%;
      margin-bottom: 15px;
      background: #444;
      border-color: #666;
      font-weight: bold;
    }

    .setting-group {
      background: #252525;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    h3 {
      margin-top: 0;
      font-size: 14px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-size: 13px;
      color: #ccc;
    }

    input[type=range] {
      width: 100%;
      margin-bottom: 20px;
      cursor: pointer;
    }

    select,
    input[type=number] {
      background: #333;
      color: #fff;
      border: 1px solid #555;
      padding: 8px;
      border-radius: 4px;
      width: 100%;
      margin-top: 5px;
      box-sizing: border-box;
    }

    .val-badge {
      float: right;
      color: #007AFF;
      font-weight: bold;
    }

    .notice {
      color: #555;
      font-size: 11px;
      text-align: center;
    }

    @media (max-width: 900px) {
      .main {
        flex-direction: column;
      }

      .controls-panel {
        width: auto;
        height: 45%;
        border-left: none;
        border-top: 1px solid #333;
      }
    }
  </style>
</head>

<body class='fit-screen'>

  <div class='header'>
    <h2 style='margin:0;font-size:18px;'>Android IP Camera</h2>
    <div>
      <button id='fitBtn' class='btn active' onclick='setView("fit")'>Fit Screen</button>
      <button id='origBtn' class='btn' onclick='setView("original")'>Original Size</button>
    </div>
  </div>

  <div class='main'>
    <div class='stream-container' id='streamContainer'>
      <img src='/stream' id='streamImg'>
    </div>

    <div class='controls-panel'>

      <div class='setting-group'>
        <h3>Settings</h3>
        <label>Camera</label>
        <div style="margin-bottom: 10px">
          <button id='backBtn' class='btn active' style='width: 49%;' onclick='setCamera("back")'>Back</button>
          <button id='frontBtn' class='btn' style='width: 49%;' onclick='setCamera("front")'>Front</button>
        </div>

        <button class='btn btn-action' onclick='fetch("/?rotate=90")'>Rotate 90&deg;</button>

        <label for="resolutionSelect">Resolution</label>
        <select id="resolutionSelect" style="margin-bottom: 20px" onchange='fetch("/?resolution="+this.value)'>
          <option value='low' {{RES_LOW_SELECTED}}>Low (Fastest)</option>
          <option value='medium' {{RES_MEDIUM_SELECTED}}>Medium</option>
          <option value='high' {{RES_HIGH_SELECTED}}>High (Sharpest)</option>
        </select>

        <label>Zoom <span class='val-badge' id='zoomVal'>{{CUR_ZOOM}}x</span></label><input type='range' min='1' max='8'
          step='0.1' value='{{CUR_ZOOM}}'
          oninput='document.getElementById("zoomVal").innerText=this.value+"x";fetch("/?zoom="+this.value)'>

        <label>Scale <span class='val-badge' id='scaleVal'>{{CUR_SCALE}}x</span></label><input type='range' min='0.5'
          max='2.0' step='0.1' value='{{CUR_SCALE}}'
          oninput='setView("original"); document.getElementById("scaleVal").innerText=this.value+"x";fetch("/?scale="+this.value)'>

        <label>Brightness <span class='val-badge' id='brightVal'>{{CUR_BRIGHTNESS}}</span></label><input type='range'
          min='-10' max='10' step='1' value='{{CUR_BRIGHTNESS}}'
          oninput='document.getElementById("brightVal").innerText=this.value;fetch("/?brightness="+this.value)'>

        <label>Contrast <span class='val-badge' id='contVal'>{{CUR_CONTRAST}}</span></label><input type='range'
          min='-50' max='50' step='1' value='{{CUR_CONTRAST}}'
          oninput='document.getElementById("contVal").innerText=this.value;fetch("/?contrast="+this.value)'>

        <label>Frame Delay (ms)</label><input type='number' min='10' max='1000' value='{{CUR_DELAY}}'
          onchange='fetch("/?delay="+this.value)'>
      </div>

      <p class="notice">Some changes will momentarily restart the camera.</p>
    </div>
  </div>

  <script>
    let currentCamera = '{{CUR_CAMERA}}';

    function updateCameraToggleBtn() {
      const backBtn = document.getElementById('backBtn');
      const frontBtn = document.getElementById('frontBtn');
      if (currentCamera === 'front') {
        backBtn.className = 'btn';
        frontBtn.className = 'btn active';
      } else {
        backBtn.className = 'btn active';
        frontBtn.className = 'btn';
      }
    }

    function setCamera(camera) {
      fetch("/?camera=" + camera);
      currentCamera = camera;
      updateCameraToggleBtn();
    }

    updateCameraToggleBtn();

    function setView(mode) {
      const b = document.body;
      const f = document.getElementById('fitBtn');
      const o = document.getElementById('origBtn');

      if (mode === 'fit') {
        b.className = 'fit-screen';
        f.className = 'btn active';
        o.className = 'btn';
      } else {
        b.className = 'original-size';
        f.className = 'btn';
        o.className = 'btn active';
      }
    }
  </script>

</body>

</html>
